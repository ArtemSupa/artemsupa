name: Generate Snake Animation

on:
  schedule:
    - cron: "0 5 * * *"   # se actualiza todos los días a las 05:00 UTC (01:00 Chile aprox)
  workflow_dispatch: {}     # te deja correrlo manual desde la pestaña Actions
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generar snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: artemsupa
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Subir a la rama "output"
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
